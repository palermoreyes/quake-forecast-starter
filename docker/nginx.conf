events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  types {
    application/manifest+json webmanifest;
  }

  # ==================================================
  # 1) HTTP DEFAULT → SIEMPRE HTTPS (cualquier host)
  # ==================================================
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ==================================================
  # 2) HTTP → HTTPS (solo tu dominio) + ACME challenge
  #    (Este bloque ya no es estrictamente necesario
  #     porque el default ya redirige, pero lo dejamos
  #     para certbot y orden.)
  # ==================================================
  server {
    listen 80;
    listen [::]:80;
    server_name proximosismo.org www.proximosismo.org;

    # Permitir ACME challenge (Certbot) por HTTP
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # TODO lo demás → HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ==================================================
  # 3) HTTPS DEFAULT (host/IP desconocido) → BLOQUEAR
  #    Evita que el host del VPS o la IP sirvan algo.
  # ==================================================
  server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/proximosismo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proximosismo.org/privkey.pem;

    return 444; # o 403 si prefieres respuesta
  }

  # ==================================================
  # 4) HTTPS REAL (SERVICIO FINAL)
  # ==================================================
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name proximosismo.org www.proximosismo.org;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/proximosismo.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proximosismo.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Fuerza HTTPS en navegadores (solo si ya estás seguro)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------
    # API Backend
    # -------------------------
    location /api/ {
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://api:8000;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      # (opcional) timeouts sanos
      proxy_connect_timeout 10s;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # -------------------------
    # Frontend
    # -------------------------
    location / {
      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;
    }

    # Service Worker y manifest deben refrescarse rápido
    location = /sw.js {
      root /usr/share/nginx/html;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      expires -1;
    }

    location = /manifest.webmanifest {
      root /usr/share/nginx/html;
      add_header Cache-Control "no-cache";
      expires -1;
    }
  }
}
